    <!-- Plataformas que dominamos Section -->
    <section class="bg-white py-24 px-6 md:px-12 lg:px-24">
        <div class="w-full mx-auto flex flex-col xl:flex-row gap-16 xl:gap-24 items-start">

            <!-- Left Side: Title -->
            <div class="w-full xl:w-[40%] xl:sticky top-24 self-start">
                <h2 class="text-4xl md:text-5xl lg:text-6xl font-black text-black leading-tight tracking-tight mb-8">
                    {{ section.title_html | safe }}
                </h2>
                <p class="text-xl md:text-2xl font-light text-gray-600 leading-relaxed">
                    {{ section.subtitle }}
                </p>
            </div>

            <!-- Right Side: Grid -->
            <div class="w-full xl:w-[60%] grid grid-cols-1 md:grid-cols-2 gap-4">
{% for item in section.items %}
                <!-- {{ item.name }} -->
                {% if item.span_full_width %}<div
                    class="group bg-black rounded-[2rem] p-10 min-h-[100px] md:col-span-2 flex flex-col md:flex-row items-start md:items-center xl:items-center gap-8 hover:bg-[{{ item.hover_color }}] transition-colors duration-300 cursor-default">
                    <img src="{{ item.icon }}" alt="{{ item.name }}"
                        class="{{ item.icon_class }}">
                    <p
                        class="text-gray-400 group-hover:text-{{ item.text_on_hover }} transition-colors text-lg font-light leading-relaxed max-w-2xl">
                        {{ item.description }}
                    </p>
                </div>{% else %}<div
                    class="group bg-black rounded-[2rem] p-8 min-h-[100px] flex flex-col justify-between hover:bg-[{{ item.hover_color }}] transition-colors duration-300 cursor-default">
                    <img src="{{ item.icon }}" alt="{{ item.name }}" class="{{ item.icon_class }}">
                    <div>
                        <p
                            class="text-gray-400 group-hover:text-{{ item.text_on_hover }} transition-colors text-lg font-light leading-relaxed">
                            {{ item.description }}
                        </p>
                    </div>
                </div>{% endif %}
{% endfor %}
            </div>
        </div>
    </section>
