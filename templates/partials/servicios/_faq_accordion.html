    <!-- Section: FAQ / What makes us different -->
    <section class="bg-black py-24 px-6 md:px-12 relative z-10 invert">
        <div class="w-full xl:px-8 mx-auto">
            <!-- Header -->
            <div class="mb-20">
                <h2 class="text-5xl md:text-6xl font-black text-white mb-8 tracking-tight">
                    {{ section.title }}
                </h2>
                <p class="text-gray-300 text-lg md:text-xl font-light max-w-3xl leading-relaxed">
                    {{ section.subtitle }}
                </p>
            </div>

            <!-- Accordion List -->
            <div class="border-t border-white">{% for item in section.items %}
                <!-- Item {{ loop.index }} -->
                <div class="faq-item border-b border-white group">
                    <button
                        class="faq-header w-full py-8 flex justify-between items-center text-left focus:outline-none cursor-pointer">
                        <span
                            class="text-2xl md:text-3xl font-light text-white group-hover:text-gray-300 transition-colors">{{ item.question }}</span>
                        <div class="w-8 h-8 md:w-10 md:h-10 transform transition-transform duration-300 faq-icon">
                            <img src="/imgs/flecha.svg" alt="Abrir" class="w-full h-full">
                        </div>
                    </button>
                    <div class="faq-content overflow-hidden max-h-0 transition-all duration-500 ease-in-out opacity-0">
                        <p class="pb-8 text-gray-400 font-light text-lg max-w-4xl">
                            {{ item.answer }}
                        </p>
                    </div>
                </div>
{% endfor %}
            </div>
        </div>
    </section>
