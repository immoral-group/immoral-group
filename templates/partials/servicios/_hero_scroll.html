    <!-- Hero Section -->
    <section class="relative w-full min-h-[200vh] z-[1] bg-black text-white flex flex-col md:flex-row">

        <!-- Left Side: Text (Scrolls) -->
        <div class="w-full md:w-1/2 relative z-10">
            <!-- First Text Block -->
            <div class="min-h-screen flex flex-col justify-center px-6 md:px-12 lg:px-24">
                <div class="space-y-6 md:space-y-8 pt-20 md:pt-0">
                    <span class="block text-base md:text-lg font-light tracking-wide text-gray-300">
                        {{ section.eyebrow }}
                    </span>
                    <h1 class="text-4xl md:text-6xl font-black leading-[0.95] tracking-tight">
                        {{ section.title_html | safe }}
                    </h1>
                    <p class="text-lg md:text-xl font-light text-gray-400 leading-relaxed max-w-lg mt-8">
                        {{ section.subtitle_html | safe }}
                    </p>
                </div>
            </div>

            <!-- Second Text Block -->
            <div class="min-h-screen flex flex-col justify-center px-6 md:px-12 lg:px-24 text-white">
                <div class="space-y-12">
                    <p class="text-base md:text-lg lg:text-xl font-light leading-relaxed max-w-xl text-gray-200">
                        {{ section.body_text }}
                    </p>
                    <div class="space-y-4 text-3xl md:text-4xl font-black tracking-tight leading-none text-left">{% for line in section.tagline_lines_html %}
                        <div class="">
                            {{ line | safe }}
                        </div>{% endfor %}
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: Spline Iframe (Sticky) -->
        <div class="w-full md:w-1/2 h-screen sticky top-0 right-0 z-0 hidden md:block">
            <iframe src="{{ section.spline_url }}" frameborder="0" width="100%"
                height="100%" class="w-full h-full object-cover">
            </iframe>
        </div>
        <!-- Mobile Spline (Non-sticky, visible only on mobile/tablet) -->
        <div class="w-full h-[50vh] block md:hidden">
            <iframe src="{{ section.spline_url }}" frameborder="0" width="100%"
                height="100%" class="w-full h-full object-cover">
            </iframe>
        </div>
    </section>

    <!-- Script to reveal text on scroll -->
    <script>
        document.addEventListener('scroll', () => {
            const reveals = document.querySelectorAll('.reveal-text');
            reveals.forEach(reveal => {
                const windowHeight = window.innerHeight;
                const elementTop = reveal.getBoundingClientRect().top;
                const elementVisible = 100;

                if (elementTop < windowHeight - elementVisible) {
                    reveal.classList.remove('opacity-0', 'translate-y-4');
                }
            });
        });
    </script>
