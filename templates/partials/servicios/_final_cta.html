    <!-- Section: Final CTA -->
    <section class="bg-black pb-32 px-6 md:px-12 relative z-10">
        <div class="max-w-[1400px] mx-auto text-center space-y-12">
            <h2 class="text-3xl md:text-3xl font-black text-white leading-tight max-w-5xl mx-auto tracking-tight">
                {{ section.title }}
            </h2>

            <div>
                <a href="{{ section.cta_href }}"
                    class="group inline-flex items-center border-2 border-[{{ accent_color }}] overflow-hidden relative transition-all duration-300">
                    <!-- Blue square with icon -->
                    <span class="flex items-center justify-center w-14 h-14 bg-[{{ accent_color }}] relative z-10 shrink-0">
                        <img src="/imgs/btn-ico.svg" alt="" class="w-5 h-5">
                    </span>
                    <!-- Text container -->
                    <span
                        class="relative px-8 py-4 text-sm md:text-base font-medium text-white uppercase tracking-widest z-10 group-hover:text-white transition-colors duration-300">
                        {{ section.cta_text }}
                    </span>
                    <!-- Animated blue background that expands on hover -->
                    <span
                        class="absolute inset-0 bg-[{{ accent_color }}] transform -translate-x-full group-hover:translate-x-0 transition-transform duration-300 ease-out"
                        style="left: 56px;"></span>
                </a>
            </div>
        </div>
    </section>
